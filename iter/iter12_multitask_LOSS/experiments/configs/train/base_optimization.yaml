# Base optimization config — SHARED across all training techniques (Ch10, Ch11, ExPLoRA, LoRA).
#
# Every technique-specific config (ch10_pretrain.yaml, ch11_surgery.yaml, explora.yaml, lora.yaml)
# inherits from this file via:
#
#   extends: base_optimization.yaml
#
# Override only what differs. The Python load_merged_config() helper handles the deep-merge.
#
# Why a base file? Avoids duplication of masking, augmentation, AdamW betas, EMA, mixed precision
# across 4+ technique files. Update once, applies everywhere.

# -- Data sampling --
data:
  hf_dataset: anonymousML123/walkindia-200k
  num_frames: 16                  # Train at 16f (Meta trains 95% at 16f, eval at 64f)
  seed: 42                        # Reproducibility (random, numpy, torch)
  # SANITY-mode clip caps (m09a/m09b/m09c read these). Small enough for quick
  # code-path validation; not intended to produce meaningful metrics. Previously
  # lived in iter7's vitg16_indian.yaml; lost in the base/extends refactor. The
  # running SANITY test fails with KeyError if these are absent.
  sanity_train_clips: 20
  sanity_val_clips: 10

  # iter11 v3 hard-pivot (2026-04-25): 80/10/10 train/val/eval split inside
  # ultra_hard_3066.json — 3,066 clips with ≥4 Hard triggers AND ≥4 Indian-specific
  # objects. All 3 splits share the same local TAR dir (data/ultra_hard_3066_local/);
  # iter_clips_parallel(subset_keys=...) filters at iteration time. Shared across
  # m09b (ExPLoRA), m09c (Surgery) and m05/m06 eval — single source of truth so
  # paired-BCa decision gate is apples-to-apples within-category.
  train_subset: data/ultra_hard_3066_train.json     # 2,452 clips (80%)
  train_local_data: data/ultra_hard_3066_local
  val_subset: data/ultra_hard_3066_val.json         # 306 clips (10%) — val_jepa loss + probe trajectory
  val_local_data: data/ultra_hard_3066_local
  eval_subset: data/ultra_hard_3066_eval.json       # 308 clips (10%) — paired-BCa decision gate
  eval_local_data: data/ultra_hard_3066_local
  # Surgery-only: m11-generated factor datasets (D_L/D_A/D_I).
  # Read by m09c StreamingFactorDataset; m09b ExPLoRA ignores it.
  factor_dir: outputs/full/m11_factor_datasets

# -- Masking (V-JEPA 2 default: 8 small + 2 large blocks) --
mask:
  - spatial_scale: [0.15, 0.15]
    temporal_scale: [1.0, 1.0]
    aspect_ratio: [0.75, 1.5]
    num_blocks: 8                 # 8 small blocks (~75-90% total masking)
  - spatial_scale: [0.7, 0.7]
    temporal_scale: [1.0, 1.0]
    aspect_ratio: [0.75, 1.5]
    num_blocks: 2                 # 2 large blocks

# -- Augmentation --
augmentation:
  random_resize_scale: [0.3, 1.0]
  random_resize_ratio: [0.75, 1.35]
  horizontal_flip: 0.5

# -- Optimizer base (AdamW) --
optimization:
  # ─── Multi-task retrieval-aware loss ───────────────────────────────────────
  # Scaffold added 2026-04-27 after probe-vs-jepa correlation analysis on the
  # 4 prior iter11 v3 runs found JEPA L1 ANTI-CORRELATED with downstream eval
  # metrics in 11/12 cells (Pearson r ranged -0.21 to -0.68 across Prec@K, mAP@K,
  # Cycle@K — see iter/utils/experiment_log.md "iter11 v3 Cross-Run Comparison").
  #
  # Default α=1, β=γ=0 → identical behavior to pure JEPA (no behavior change).
  # Variant yamls (e.g., surgery_3stage_DI_multitask.yaml) override to activate.
  #
  # ── Per-component → downstream eval metric mapping ─────────────────────────
  #   total = α · JEPA + β · InfoNCE(same-clip vs in-batch) + γ · TCC(soft-NN cycle)
  #
  #   • α · JEPA       → V-JEPA 2.1 GENERATIVE REGULARISER. Preserves the
  #                      pretrained masked-token reconstruction prior; prevents
  #                      catastrophic forgetting when β,γ pull weights for
  #                      retrieval. NOT a retrieval surrogate (proven anti-corr).
  #   • β · InfoNCE    → DRIVES Prec@K & mAP@K. Per-clip pooled vectors of
  #                      (student predictor output, teacher target) form positive
  #                      pairs; other clips in the batch are negatives. Symmetric
  #                      cross-entropy over the (B × B) similarity matrix at
  #                      temperature τ_infonce. Direct surrogate for top-K kNN
  #                      retrieval (Patel et al. CVPR 2022 Recall@K Surrogate;
  #                      Chen et al. SimCLR ICML 2020).
  #   • γ · TCC        → PINS Cycle@K. Soft-nearest-neighbor cycle on token
  #                      positions within a clip: forward (student→teacher),
  #                      backward (→student); cross-entropy targets identity.
  #                      Direct surrogate for the kNN-cycle-back metric m06 reports
  #                      as Cycle@K (Dwibedi et al. CVPR 2019 Temporal Cycle-
  #                      Consistency Learning, Google Research).
  #
  # Multi-task pattern follows VICReg + V-JEPA 2 + CLIP-head training in the
  # facebookresearch / openai stacks: a generative anchor (JEPA / MAE / autoenc)
  # paired with a discriminative head (contrastive + alignment).
  # See src/utils/training.compute_multitask_loss for the math.
  loss:
    alpha_jepa:           1.0     # α — JEPA L1 (generative regulariser); IGNORED when uncertainty_weighting=true
    beta_infonce:         0.0     # β — InfoNCE (drives Prec@K, mAP@K); IGNORED when uncertainty_weighting=true; gates compute when false
    gamma_tcc:            0.0     # γ — TCC soft-NN cycle (pins Cycle@K); IGNORED when uncertainty_weighting=true; gates compute when false
    infonce_temperature:  0.07    # τ — SimCLR/MoCo standard (Chen et al. ICML 2020)
    tcc_temperature:      0.10    # τ — Dwibedi et al. CVPR 2019 default
    # errors_N_fixes #81 (2026-04-27) — two knobs added after iter12 v1 diagnostic
    # showed raw TCC = 6.6 vs JEPA = 0.5 → TCC consumed ~80 % of gradient signal
    # while InfoNCE (the actual Prec@K driver) was starved at ~11 %. UW couldn't
    # rebalance fast enough at LR=5e-5 (w_tcc moved only −2.7 % in 770 steps).
    tcc_enabled:          true    # false → drop TCC entirely from compute + UW state (option #3 "pure retrieval-aware FT")
    tcc_scale:            1.0     # multiplier applied to raw TCC BEFORE UW/γ sees it (option #1 "loss normalization"; set to 0.0833 ≈1/12 to balance against JEPA)
    # Kendall et al. CVPR 2018: N learnable nn.Parameter log-variances (one per
    # active task — set by tcc_enabled) replace fixed α/β/γ. Loss = Σ exp(-s_i)·L_i + s_i.
    # Init s_i=0 → σ²=1 → weights all = 1. Optimizer learns them jointly with model
    # → ZERO HP search needed. Standard for VICReg / V-JEPA 2 / MultiMAE multi-head
    # training. When true, all enabled losses ALWAYS computed; α/β/γ above ignored.
    uncertainty_weighting: false

  optimizer: adamw
  betas: [0.9, 0.999]
  eps: 1.0e-8
  weight_decay: 0.04
  final_weight_decay: 0.04        # Fixed (no WD ramp)

  # Predictor LR — Meta uses SAME LR as encoder (gold standard audit)
  # Our old 10x multiplier may have caused predictor overfit during Ch10
  pred_lr_multiplier: 1.0

  # Universal V-JEPA 2.1 fine-tuning recipe — locked at the published values
  # (Adam β/LR/WD co-tuned at BS=32). lr=1e-5 = linear-BS-scaled from Meta's
  # peak 6e-4 at global BS=1536 (facebookresearch/vjepa2/configs/train_2_1/vitG16/*.yaml,
  # Goyal et al 2017 "Accurate Large Minibatch SGD", arXiv:1706.02677): 6e-4 × (32/1536)
  # = 1.25e-5 → rounded to 1e-5. NOT a "paper default" — 6e-4 is from-scratch peak;
  # at our BS=32 it would reproduce iter8's λ=0.001 catastrophic-forgetting regime
  # (Prec@K −21.8 pp, 2026-04-05 Run #2). 1e-5 = surgical regime where pretrained
  # features survive while still moving (v10 grad_norm decayed 15× over 297 steps
  # at 1e-6 → late-stage updates ≈ 0; 10× bump confirmed under-training hypothesis).
  # Changing any of these forces re-tuning and breaks apples-to-apples comparison
  # with the V-JEPA 2.1 baseline.
  # iter11 v2 (2026-04-26): bumped 1.0e-5 → 5.0e-5 (5×). Re-anchored to Meta's
  # CONTINUAL-training peak (4.25e-4 @ BS=256 in vjepa2/configs/train/vitg16/droid-256px-8f.yaml),
  # linearly BS-scaled to BS=32 → 5.3e-5. Previous 1.0e-5 was anchored to the
  # FROM-SCRATCH peak (6e-4 @ BS=1536 → 1.25e-5) — wrong reference for transfer
  # learning. Evidence for under-training: surgery_2stage_noDI v2 (5 epochs)
  # train-loss 0.496 → 0.460 (Δ -7%) and probe Prec@K 75.0 → 75.22 (Δ +0.22 pp,
  # well within ±3.78 pp BCa CI). Guardrails co-bumped: grad_clip 10→1, warmup_cap
  # 10→15%, nan_tolerance 3→2. Val-loss plateau (the sole active kill-switch)
  # backstops divergence.
  lr: 5.0e-5
  batch_size: 32                  # Research-LOCKED effective (macro) BS — V-JEPA 2.1 published recipe. AdaptiveBatchSizer picks MICRO sub-batch (start=16→max=32) for VRAM adaptation; 32 grads always accumulate before optimizer.step().
  max_epochs:
    sanity: 1
    poc: 1                        # code-path validation only.
    full: 15                      # iter11 v2 (2026-04-26): bumped 5→15 — surgery_2stage_noDI v2 showed val-loss still descending at epoch 5 (0.494→0.466) while probe Prec@K plateaued (+0.22 over 27 probes). More steps to let val-loss flatten before plateau-patience fires. Matches SSL canon (V-JEPA 2 / DINOv2 / ExPLoRA paper) fixed-budget training.

  # LR schedule — single cosine decay from peak `lr` to `min_lr` after warmup.
  # `build_scheduler` (utils/training.py:503-516) is unconditionally cosine — there
  # is no constant-vs-cosine branch. The previous `lr_schedule: constant` field
  # was dead (zero Python readers); deleted 2026-04-26 to remove the footgun.
  # SINGLE cosine, not cyclical re-warming — the arXiv:2503.02844 forgetting
  # warning applies to re-warming only.
  warmup_steps: 500
  warmup_cap_pct: 15              # iter11 v2 (2026-04-26): 10 → 15. At lr=5e-5 (5× prior),
                                  # optimizer needs more warmup steps to find a stable basin
                                  # (171 steps vs 114 for the 1140-step 15-epoch budget).
  min_lr: 1.0e-6                  # LR floor; cosine decays from `lr` to this value
                                  # across (total_steps - warmup_steps).

  # iter11 auto disk-hygiene — mode-gated cache-policy default consumed by
  # m09a/m09b/m09c's merge_config_with_args. SANITY keeps ALL intermediate ckpts for
  # debug (1-step run, small total footprint); POC/FULL auto-enable cleanup because
  # 5-epoch POC writes ~25 × 15 GB periodic ckpts → disk-full without it. Explicit
  # CLI `--cache-policy 1|2` always wins over this yaml default.
  cache_policy:
    sanity: 1
    poc: 2
    full: 2

  # EMA teacher (fixed momentum, V-JEPA 2 default)
  ema_momentum: 0.99925

  # Gradient clipping — iter11 v2 (2026-04-26): 10.0 → 1.0. At lr=5e-5 the per-step
  # parameter movement risk grows; 1.0 is the standard transformer-FT bound (BEiT,
  # MAE, DINOv2). 10.0 (V-JEPA 1 default) is sized for Meta's 315-epoch budget
  # which can absorb spikes; our 1140-step run cannot.
  grad_clip: 1.0

  # Loss
  loss_exp: 1.0                   # L1 latent prediction

  # NaN safety
  nan_tolerance: 2                # iter11 v2 (2026-04-26): 3 → 2. At lr=5e-5 a NaN
                                  # is divergence, not a transient — 2 consecutive
                                  # confirms (1 alone could be a numeric blip).
  gc_interval: 50                 # Manual GC every N steps

  # Memory-saver flags (#56) — safe defaults OFF; technique-specific configs
  # override when needed (surgery NEEDS both on 24GB SANITY for 36-block Stage 3).
  # 8-bit AdamW: ~4× optimizer-state reduction, <1% accuracy (Dettmers 2022).
  # Gradient checkpointing: ~2-4× activation reduction, ~25% throughput hit.
  use_8bit_optim: false           # bitsandbytes AdamW8bit (drop-in AdamW replacement)
  gradient_checkpointing: false   # torch.utils.checkpoint on transformer blocks

# -- Cooldown phase (V-JEPA 2.1: switch to 64f + linear LR decay) --
cooldown:
  enabled: true                   # Run cooldown after main training
  num_frames: 64                  # Match eval frame count (VJEPA_FRAMES_PER_CLIP)
  epochs: 1                       # 1 epoch for continual training (Meta: 40 for from-scratch)
  lr_schedule: linear_decay       # Linear decay to final_lr (not cosine)
  final_lr: 1.0e-6                # Near-zero by end
  warmup_steps: 0                 # No warmup during cooldown
  weight_distance_loss: false     # Disable distance weighting (Meta's cooldown config)

# -- Validation --
# iter11 v3 (2026-04-26): `evals_per_epoch` REMOVED. m09a/m09b now reuse
# `checkpoint.saves_per_epoch` (already what m09c reads via probe.cadence:
# saves_per_epoch). Single source of truth — val + probe + ckpt all fire
# on the same 5x/epoch tick.
validation:
  max_val_clips: 1000             # Subsample for periodic eval
  cycle_k: [1, 10]
  faiss_k: 6

# -- Checkpointing --
checkpoint:
  # iter11 (2026-04-24): 10 → 5 so plateau_patience=5 probes = 1 full epoch of no
  # val-loss improvement (5 probes/epoch × patience=5). Affects probe cadence via
  # `probe.cadence: saves_per_epoch` in all m09x yamls — 5 epochs × 5 = 25 probes total.
  saves_per_epoch: 5
  keep_last_n: 2                  # Keep only last 2 checkpoints (~7 GB each with student-only saves)

# -- Mixed precision --
mixed_precision:
  enabled: true
  dtype: bfloat16                 # bfloat16 (not float16 — full dynamic range, no GradScaler needed)

# -- Mid-training probe eval (trajectory monitor + best-ckpt + early-stop) --
# Probe runs on 306 ultra_hard_3066_val clips → Prec@K / mAP@K / Cycle@K with
# BCa 95% CI + JEPA val-loss. On `saves_per_epoch` cadence, probe fires every
# `steps_per_epoch // saves_per_epoch` steps → 5 probes/epoch. Best-ckpt: tracks
# running max Prec@K; exports student_best.pt on each new max; at end-of-training,
# student_best.pt is promoted to student_encoder.pt.
#
# iter11 v3 B1 pivot (2026-04-26): probe.subset == data.val_subset (same hard
# distribution as train + eval). Previously val_1k.json (1000 generic clips)
# decoupled the trajectory metric from the decision gate.
#
# iter11 (2026-04-24, universal across all techniques 2026-04-26): val-loss
# plateau is the ONLY enabled early-stop trigger. All Prec@K-driven triggers
# (kill_switch / prec_plateau / bwt) operate below the BCa CI_half noise floor
# (±2.4 pp @ N=306) → they fire on sampling jitter regardless of variant. SSL
# canon (V-JEPA 2 / DINOv2 / ExPLoRA paper) trains to fixed cosine-to-zero
# budget or stops only on val-loss plateau. Probe Prec@K stays as monitoring-only
# (plot + ckpt selection) — NOT as training terminator.
probe:
  enabled:                  {sanity: false, poc: true, full: true}
  subset:                   data/ultra_hard_3066_val.json
  local_data:               data/ultra_hard_3066_local
  tags_path:                data/ultra_hard_3066_local/tags.json
  k:                        6                                          # matches configs/pipeline.yaml eval.K
  bootstrap_iter:           10000                                      # matches utils/bootstrap.N_BOOTSTRAP
  cadence:                  saves_per_epoch                            # reuses checkpoint.saves_per_epoch
  best_ckpt_enabled:        {sanity: false, poc: true, full: true}    # save student_best.pt on each new max Prec@K
  # -- Early-stop #1: catastrophic-forgetting kill-switch (DISABLED — noise-level) --
  kill_switch_enabled:      {sanity: false, poc: false, full: false}
  forgetting_threshold_pct: 5.0
  forgetting_patience:      3
  # -- Early-stop #2: val-loss plateau detector (THE ONLY ACTIVE TRIGGER) --
  plateau_enabled:          {sanity: false, poc: true, full: true}
  plateau_min_delta:        1.0e-3       # min val_jepa drop to reset patience (~0.2% relative).
  plateau_patience:         5            # consecutive probes with delta < min_delta → stop + export best-ckpt.
  # -- Early-stop #2b: Prec@K plateau detector (DISABLED — noise-level) --
  prec_plateau_enabled:     {sanity: false, poc: false, full: false}
  prec_plateau_min_delta:   0.3
  prec_plateau_patience:    5
  # -- Early-stop #3: negative-BWT cumulative trigger (DISABLED — noise-level) --
  bwt_trigger_enabled:      {sanity: false, poc: false, full: false}
  bwt_ci_fraction:          0.5
  bwt_absolute_floor:       0.3
  bwt_patience:             3
  # -- Held-out val source --
  # use_permanent_val=true → val_keys come from probe.subset (= data.val_subset =
  # ultra_hard_3066_val.json, 306 clips). Train uses ALL of train_subset.
  # use_permanent_val=false → falls back to internal data.train_val_split (POC code-test).
  use_permanent_val:        {sanity: false, poc: false, full: true}
  compute_val_loss:         true         # also compute JEPA val-loss on probe clips (~2 s per call at N=306).
  # NOTE: probe forward micro-batch is adaptive — AdaptiveBatchSizer reads pipeline.yaml
  # gpu.{inference_vjepa_initial_bs, training_adapted_probe_bs, gpu_memory_target} at
  # runtime. Do NOT hardcode sub_batch here (CLAUDE.md B35, errors_N_fixes #47).
