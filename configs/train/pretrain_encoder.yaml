# probe_pretrain — P2 continual SSL pretraining on the probe eval pool.
#
# Trains m09a1_pretrain_encoder.py for 5 epochs on the train-split keys produced by
# probe Stage 1 (action_labels.json), with a strong L2 anchor to Meta's weights.
# Output checkpoint feeds probe eval as encoder = vjepa_2_1_pretrain_encoder.
#
# Differs from ch10_pretrain.yaml by:
#   1. lr 1e-6 → 1e-5 (10× higher than ch10's failed value; 10× lower than
#      Meta's continual peak — sweet spot where weights move but stay near Meta's basin)
#   2. max_epochs.full 15 → 5 (per user spec; ~6,966 train clips × 5 ≈ 35K samples)
#   3. drift_control: ewc + λ sweep → l2_uniform with lambda_reg=1.0 (single
#      anchor; mirrors surgery_base.yaml:206-209 idiom)
#   4. layer_freeze: keep [20, 48) trainable (LayerLock; same as ch10)
#   5. Per-mode memory savers (SANITY 24GB true / FULL 96GB false) — mirrors
#      surgery_base.yaml:96-114
#   6. data.module: m09a, data.output_dir: outputs/<mode>/m09a1_pretrain_encoder
#   7. data.subset/local_data: SUPPLIED at runtime via --subset / --local-data
#      (run_train.sh extracts train-split keys from action_labels.json)
#
# Output: outputs/<mode>/m09a1_pretrain_encoder/{m09a_ckpt_best.pt, student_encoder.pt}
# Consumed by probe eval as encoder=vjepa_2_1_pretrain_encoder.
#
# USAGE:
#   ./scripts/run_train.sh pretrain --SANITY     # 24 GB validation
#   ./scripts/run_train.sh pretrain --FULL       # 96 GB
#
# Or direct (advanced):
#   python -u src/m09a1_pretrain_encoder.py --SANITY \
#       --model-config configs/model/vjepa2_1.yaml \
#       --train-config configs/train/pretrain_encoder.yaml \
#       --subset data/eval_10k_local/eval_10k_train_split.json \
#       --local-data data/eval_10k_local \
#       --val-subset data/eval_10k_local/eval_10k_val_split.json \
#       --val-local-data data/eval_10k_local \
#       --output-dir outputs/sanity/m09a1_pretrain_encoder \
#       --no-wandb 2>&1 | tee logs/probe_pretrain_sanity.log

extends: base_optimization.yaml

# -- Data: m09a entry-point + probe output namespace --
# train/val subsets + local_data come from CLI (--subset, --val-subset,
# --local-data, --val-local-data) — base_optimization's ultra_hard_3066 paths
# are NOT used; run_train.sh feeds eval_10k train/val split JSONs.
data:
  module: m09a
  # iter13 v12+ (2026-05-06): probe_pretrain → m09a1_pretrain_encoder (match source module).
  # Auto-overridden by run_train.sh's --output-dir per mode.
  output_dir: outputs/full/m09a1_pretrain_encoder
  # num_frames inherits from base_optimization.yaml scalar (16). The 8-frame
  # SANITY override (probe_pretrain_sanity_v6.log experiment) didn't help — even
  # at sub-batch=1 + 8 frames + all memory savers, V-JEPA ViT-G + teacher copy +
  # optimizer state exceeded 24 GB. Pretrain training requires 96 GB; SANITY at
  # 24 GB is for eval-side validation only.

# -- Optimization overrides (the 3 user-spec deltas) --
optimization:
  # iter13 LR-bump (2026-05-04, after v5+v6+v7 stuck-encoder diagnosis):
  # lr 1e-5 → 1e-4 (Meta's official continual SSL peak for V-JEPA 2.1 ViT-G).
  # Diagnostic evidence: per-block weight diff vs Meta init showed rel_l2 ~2e-5
  # across ALL 48 blocks after 1085 steps at lr=1e-5 — encoder was frozen-in-
  # practice. Top-1 plateaued at 0.825 ±0.003 across 21 probes spanning 860 steps
  # in v5+v6+v7 — pure noise; encoder representations didn't change.
  # Safeguards against overshoot/divergence at LR=1e-4:
  #   (a) warmup_pct: 12 (in base_optimization.yaml) — auto-scales with total_steps;
  #       at 1085-step run = 130 warmup steps; previously hardcoded warmup_steps=1500
  #       was silently capped to 162 by the dropped warmup_cap_pct knob. iter13.
  #   (b) min_lr 1e-6 → 1e-5 (floor at 10% of peak instead of 1% — keeps signal alive)
  #   (c) gradient clip stays at 1.0 (current grad_norm ~0.3 → 3× headroom)
  #   (d) drift L2 anchor λ=1.0 retained (anchors weights near Meta init)
  #   (e) layer_freeze blocks 0-19 (Fix #2; static base prevents catastrophic
  #       forgetting of early visual features)
  #   (f) NaN-skip via GradScaler is already wired (bf16 path is no-op skip)
  #   (g) assert_encoder_diverged_from_init at end-of-train fails-loud if
  #       rel_l2 exceeds catastrophic threshold
  lr: 1.0e-4                       # Meta's official continual SSL peak.
  pred_lr_multiplier: 1.0          # Meta convention (gold standard audit).
  min_lr: 1.0e-5                   # 10% of peak floor (was 1e-6 = 1% of peak)

  max_epochs:
    sanity: 1                      # 24 GB code-path validation only
    poc: 2
    full: 5                        # user spec — 5 × ~6,966 train clips ≈ 35K samples

  batch_size: 32                   # auto-overridden by AdaptiveBatchSizer

  # Per-mode memory savers — 24 GB SANITY needs all three; 96 GB FULL clean fp32
  # for paper-quality runs. Matches surgery_base.yaml:96-114 pattern.
  use_8bit_optim:
    sanity: true                   # bitsandbytes AdamW8bit (~4× optim-state reduction)
    poc:    false
    full:   false                  # clean fp32 — eliminates 8-bit accuracy confound
  gradient_checkpointing:
    sanity: true                   # ~2-4× activation memory reduction
    poc:    false
    full:   false
  paged_optim:
    sanity: true                   # CPU paging when 8-bit optim still pressures 24 GB
    poc:    false
    full:   false

# -- Layer freezing (LayerLock — train top half) --
# Same as ch10_pretrain.yaml. ViT layers converge in depth order
# (LayerLock arXiv:2509.10156); freeze 0-20, train 20-48 → only top half updates.
# SANITY: combined with grad-ckpt, 28 trainable blocks fit in 24 GB.
layer_freeze:
  enabled: true
  freeze_below: 20

# -- Drift control: L2 anchor to Meta's weights (NOT EWC sweep) --
# init_params is captured at build_model() (m09a1_pretrain_encoder.py:315) = a CPU clone
# of the loaded checkpoints/vjepa2_1_vitG_384.pt weights. compute_drift_loss
# (utils/training.py:466) computes lambda * ||theta - theta_0||^2 — type-agnostic
# L2; the `type: l2_uniform` field is documentation-only (no Python branch reads
# it, kept for parity with surgery_base.yaml:208).
drift_control:
  # iter13 v11 (2026-05-05): Meta uses NO L2 anchor (verified
  # deps/vjepa2/app/vjepa_2_1/train.py — no compute_drift_loss).
  # v10 confirmed λ=1.0 caused encoder collapse to init by step 971
  # (drift 1.26e-4 peak → 3.96e-5 reverted, 95% pullback). EMA teacher +
  # layer_freeze provide sufficient anti-forgetting without anchor pullback.
  enabled: false
  type: l2_uniform                 # mirrors surgery_base.yaml:208 (doc only)
  lambda_reg: 0.0                  # ignored when enabled=false; was 1.0 in v10
  # Below blocks are inert when type=l2_uniform (no FIM, no ablation sweep).
  # Kept null/false to avoid KeyError in any defensive .get() in older code.
  ablation_lambdas: []
  fim:
    enabled: false
    fim_path: null
    fim_n_clips: 0
  vicreg:
    enabled: false                 # off — keep loss = JEPA + lambda*L2 only.
    var_weight: 0.0
    cov_weight: 0.0

# -- Monitoring (loose; val-loss plateau is the only kill switch via probe block) --
monitoring:
  drift_loss_ratio_min: 0.001      # warn-only (m09a logs but doesn't kill); ch10 had 0.01 for EWC
  effective_rank_min_ratio: 0.95
  knn_probe_clips: 1000
  knn_min_accuracy: null

# -- Mid-training probe (action-classification top-1 accuracy via leave-one-out
#    kNN-centroid). Inherits the SCHEMA from base_optimization.yaml:probe but
#    overrides paths to point at the eval_10k val split (not ultra_hard_3066).
#    Per iter13 pivot, the probe metric is TOP-1 ACCURACY (NOT Prec@K).
#    SANITY: disabled (n=21 too small for stable BCa CI). POC/FULL: enabled.
probe:
  subset:     data/eval_10k_local/eval_10k_val_split.json    # generated by run_train.sh from action_labels.json
  local_data: data/eval_10k_local             # same TARs as run_eval.sh reads
  tags_path:  data/eval_10k_local/tags.json   # for class derivation (3-class default)
  # All other knobs (enabled, k, bootstrap_iter, kill_switch_*, plateau_*, etc.)
  # inherited from base_optimization.yaml:249-283. SANITY mode disables probe.

# -- Multi-task probe-loss supervision (taxonomy 15 RETRIEVAL tag dims) — DISABLED v12.
# iter13 v12 (2026-05-06): downstream metric is motion-flow top-1, NOT retrieval.
# 15 tag dims (scene/weather/lighting/...) gave the encoder retrieval gradient,
# stealing capacity from motion learning. v11 confirmed empirically: with
# multi_task_probe enabled + JEPA L1, motion-flow probe_top1 was flat at ~0.25
# (oscillating 0.245 → 0.263 → 0.238 → 0.263 across 4 epochs, +1.8 pp net = noise).
# v12 REPLACES multi_task_probe with motion_aux below — single supervised aux loss
# directly aligned with the eval metric.
multi_task_probe:
  enabled: {sanity: false, poc: false, full: false}

# -- Motion-features auxiliary loss (Phase 3, iter13 v12, 2026-05-06).
# V-JEPA's main JEPA L1 is appearance-centric (predicts next-frame pixels via
# EMA teacher). motion_aux gives the encoder DIRECT gradient toward RAFT-derived
# motion structure: (a) K-class motion-flow CE matching probe_action eval metric
# (K=8 surviving classes empirically — see plan_v12_motion_aux.md), (b) 13-D MSE
# on the raw m04d feature vector (mean/std/max mag + 8-bin angle hist + cam_x/y).
# Both branches share a 256-D trunk → encoder gradient consolidated.
#
# Hyperparams chosen by analogy to multi_task_probe (which already worked end-to-end):
# weight_jepa:weight_motion = 10:1 keeps JEPA dominant; per-branch w_ce:w_mse = 1:1
# since both are normalized (CE → log K=2.08 nats max for 8 classes; MSE on
# z-normalized vec13d → ~1 per dim → ~13 total).
motion_aux:
  enabled:
    sanity: true                              # validate code path on 24 GB
    poc:    true
    full:   true                              # the actual research run
  # iter15 Phase 5 V2 (2026-05-15): motion_features_path + action_labels_path
  # arrive exclusively via run_train.sh CLI (--motion-features-path +
  # --probe-action-labels). Removed yaml hardcoded defaults per CLAUDE.md
  # "No DEFAULT, no hardcoded paths" — yaml outputs/full/... value silently
  # mis-routed SANITY/POC modes (which write action_labels.json to
  # outputs/sanity/ or outputs/poc/).
  weight_motion: 0.1                          # λ_motion (motion_aux total weight in L_total)
  weight_ce:     1.0                          # w_ce branch weight
  weight_mse:    1.0                          # w_mse branch weight
  head:
    hidden_dim: 256                           # trunk dim — ~430 K head params total
    dropout:    0.1
  head_lr_multiplier: 10.0                    # head LR = base_lr × 10 (mirrors multi_task_probe)
