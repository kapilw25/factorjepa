# Ch11: Factor Surgery — head-only D_I variant (iter15 Pillar 1)
#
# Trains m09c2_surgery_head.py with FROZEN Meta encoder + FROZEN Meta predictor.
# Single head-only stage, inherits D_I-rich mode_mixture from parent surgery_3stage_DI.
# Tests whether factor-augmented data path improves motion_aux head when encoder
# is decorative (vs surgery_2stage_noDI_head.yaml which has no D_I).
#
# Differs from surgery_3stage_DI_encoder.yaml by:
#   1. Collapses 3 stages → 1 stage (encoder frozen always; progressive unfreezing moot).
#   2. unfreeze_below 0.083/0.167/0.167 → 0.0 (ALL ViT-G blocks frozen).
#   3. drift_control.enabled: stays false (nothing drifts).
#   4. loss.weight_jepa: → 0.0 (frozen predictor → no gradient signal).
#   5. data.adapted_encoder: vjepa_2_1_surgical_3stage_DI → vjepa_2_1_surgical_3stage_DI_head.
#   6. lp_ft_stage0.enabled: false (we already force single head-only stage).
#
# Output: outputs/<mode>/m09c_surgery_3stage_DI_head/{m09c_ckpt_best.pt, student_encoder.pt, motion_aux_head.pt}
# Consumed by probe eval as encoder=vjepa_2_1_surgical_3stage_DI_head.
#
# USAGE:
#   ./scripts/run_train.sh surgery_3stage_DI_head --SANITY     # 24 GB code-path validation
#   ./scripts/run_train.sh surgery_3stage_DI_head --POC        # 24 GB POC training
#   ./scripts/run_train.sh surgery_3stage_DI_head --FULL       # 24 GB FULL training (head fits)
#
# Or direct (advanced):
#   python -u src/m09c2_surgery_head.py --SANITY \
#       --model-config configs/model/vjepa2_1.yaml \
#       --train-config configs/train/surgery_3stage_DI_head.yaml \
#       --subset data/eval_10k_local/eval_10k_train_split.json \
#       --local-data data/eval_10k_local \
#       --val-subset data/eval_10k_local/eval_10k_val_split.json \
#       --val-local-data data/eval_10k_local \
#       --output-dir outputs/sanity/m09c_surgery_3stage_DI_head \
#       --no-wandb 2>&1 | tee logs/surgery_3stage_DI_head_sanity.log

extends: surgery_3stage_DI_encoder.yaml

# -- Data: m09c2 entry-point + head-only output namespace --
data:
  module: m09c2
  adapted_encoder: vjepa_2_1_surgical_3stage_DI_head
  output_dir: outputs/full/m09c_surgery_3stage_DI_head    # auto-overridden by run_train.sh per mode

# -- Interaction mining: still required to materialize D_I tubes for the head's training data --
interaction_mining:
  enabled: true

# -- Single head-only stage with D_I-rich mixture --
# Encoder is frozen always → progressive unfreezing has no meaning. We keep ONE
# stage that inherits stage3_interaction's mode_mixture {L: 0.15, A: 0.15, I: 0.70}.
# lp_ft_stage0 explicitly disabled — we already force the single head-only stage.
surgery:
  warmup_mode: single
  total_warmup_pct: 0.10
  lp_ft_stage0:
    enabled: false
  stages:
    - name: stage0_head_only_DI
      unfreeze_below: 0.0                          # ALL 48 blocks frozen
      mode_mixture: {L: 0.15, A: 0.15, I: 0.70}    # inherits D_I-rich from parent stage3
      max_epochs_pct: 1.0                          # consume entire epoch budget

# -- No drift anchor — nothing drifts (encoder + predictor frozen) --
drift_control:
  enabled: false
  type: l2_uniform
  lambda_reg: 0.0
  ablation_lambdas: []

# -- Skip JEPA loss; motion_aux head is the sole training signal --
loss:
  weight_jepa: 0.0
  weight_motion_aux: 1.0

# -- Probe-head LR (10× higher than encoder fine-tuning) --
# iter15 D12 (2026-05-16): explicit spd.enabled: false override. surgery_base.yaml
# now sets spd.enabled: true as R1 default for the encoder variants. Head cells have
# unfreeze_below=0.0 → zero trainable backbone params → SPDAdamW.n_anchored=0 →
# build_optimizer:705 FATAL. Head cells use vanilla AdamW for the motion_aux head
# only. The other R1 knobs (FROZEN teacher, saliency, replay 0.5) still inherit.
optimization:
  lr: 5.0e-4
  pred_lr_multiplier: 1.0
  min_lr: 5.0e-5
  warmup_pct: 0.10
  weight_decay: 0.05
  spd:
    enabled: false                       # head cells: NO trainable backbone → SPD N/A
