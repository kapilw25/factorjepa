# iter10 v15c (safer-interactions) — forked from ch11_surgery.yaml 2026-04-21.
# Diffs from base:
#   1. interaction_mining.enabled: false → true (populate n_interactions in segments.json)
#   2. Re-add stage3_interaction with unfreeze_below: 0.50 (softer than prior iter8 0.75
#      which caused BWT=-0.33 over-destabilization)
#   3. max_epochs_pct renormalized to 0.40 / 0.30 / 0.30 (sum 1.00 across 3 stages)
#   4. stage3 mode_mixture I: 0.70 (moderate vs prior iter8 0.85 that hurt)
# Hypothesis: shallower unfreeze + typed D_I (cat_a/cat_b from #77 #80) may let
# Stage 3 add information without catastrophic forgetting of Stages 1+2.
# REQUIRES: prior run of `m10 --interactions-only` + `m11 --regen-D_I` to populate
# D_I tubes (SAM3 NOT re-run — masks cached).
#
# Ch11: Factor Surgery — Progressive Prefix Unfreezing with Factor Datasets
# (FactorJEPA proposal Sec 11)
#
# This is the PAPER NOVELTY. THE experiment that determines whether the approach works.
#
# Recipe (revised 2026-04-19 after 1K POC Surgery≈Frozen diagnosis):
#   1. SAM3 segments video clips into agent vs layout (motion filter)
#   2. Generate factor datasets:
#        D_L = layout-only (blur agents)
#        D_A = agent-only (suppress background)
#        D_I = interaction tubes (multi-agent events — STILL GENERATED for future ablations,
#              but NOT consumed in current 2-stage recipe)
#   3. **2-STAGE** progressive unfreezing on FROZEN V-JEPA 2.1 (Stage 3 dropped):
#        Stage 1: layers 0 → 25%L, 100% D_L                   (50% of step budget)
#        Stage 2: layers 0 → 50%L, 70% D_A + 30% D_L replay   (50% of step budget)
#   4. Same JEPA loss — only input distribution and trainable depth change.
#
# WHY Stage 3 dropped: 1K POC run (logs/m09c_1k_surgery_v3.log, 2026-04-19) showed
# Prec@K peaked at 20.50 in Stage 1 (step 12), held through Stage 2, then DROPPED
# to 19.83-20.00 in Stage 3 (BWT=-0.33). The 75%-unfreeze + 85% D_I in Stage 3
# over-destabilized the representation. Stages 1+2 captured the useful gain.
# D_I factor kept ON DISK for optional 3-stage ablation (re-enable by adding
# stage3 back to surgery.stages below).
#
# WHY replay 10% → 30% in Stage 2: CLEAR (NeurIPS 2018, Rolnick et al.) recommends
# 50/50 novel-replay mix and reports insensitivity to exact ratio in [20-50%].
# Our old 10% sat below their empirical noise floor → old-factor (layout) signal
# was lost at the Stage 1→2 transition. 30% is a conservative move toward CLEAR's
# recipe without fully halving Stage 2's agent-factor exposure.
#
# USAGE:
#   python -u src/m09c_surgery.py \
#       --model-config configs/model/vjepa2_1.yaml \
#       --train-config configs/train/ch11_surgery.yaml \
#       --FULL --subset data/subset_10k.json --local-data data/subset_10k_local
#
# POC Mode (Phase 2b, 2026-04-17 onward):
#   - 1000 clips from data/val_1k.json, all 3 factors (D_L + D_A + D_I), 3 stages
#   - Clip count derived from --subset + --local-data manifest (fail-loud, no yaml fallback)
#   - ~2.7 h GPU on RTX PRO 6000 96GB (100 epochs × 3 stages)

extends: base_optimization.yaml

# -- Data split overrides (m09c-specific train/val) --
# Deterministic 90/10 split via seeded shuffle (cfg.data.seed from base_optimization.yaml).
# Held-out val clip_keys are written to outputs/.../m09c_surgery/val_split.json for
# downstream Step D (Frozen m05), Step E (Surgical m05), Step F (m06 decision gate) —
# apples-to-apples on the same held-out 10%. SANITY uses 1.0 (no split) since N=20 is
# too small to split further. Removes the 2026-04-19 test-leakage flaw where training,
# probe, and decision gate all ran on identical val_1k clips.
data:
  train_val_split:
    sanity: 1.0                   # no split (N=20 too small)
    poc: 0.9                      # 900 train / 100 held-out val
    full: 0.9                     # 103K train / 12K held-out val

  # iter11 v2 paths — read by scripts/run_train.sh + run_eval.sh + run_factor_prep.sh via yaml_extract.
  # surgery_3stage_DI.yaml is the MAXIMAL factor config (interaction_mining=true) — pass to
  # run_factor_prep.sh so m10/m11 generate D_I tubes that all 3 surgery variants can consume.
  module: m09c
  adapted_encoder: vjepa_2_1_surgical
  model_config: configs/model/vjepa2_1.yaml
  train_subset: data/subset_10k.json
  train_local_data: data/subset_10k_local
  val_subset: data/val_1k.json
  val_local_data: data/val_1k_local
  factor_dir: outputs/full/m11_factor_datasets
  output_dir: outputs/full/surgery_3stage_DI
  eval_subset: data/eval_10k.json
  eval_local_data: data/eval_10k_local

# -- Streaming factor generation (eliminates m11 D_L/D_A .npy disk writes) --
# When enabled, m09c DataLoader generates D_L/D_A on-demand from (raw_mp4 +
# m10_mask.npz) pairs. Unlocks 10K→50K→115K scale ladder on a single 500 GB
# instance (vs 500 GB → 3 TB → 5 TB rent). See iter/iter9/plan_code_dev.md.
# Legacy POC run stays on FactorSampler disk path for bitwise reproducibility.
factor_streaming:
  sanity: false                   # legacy .npy path (iter8 SANITY reproducible)
  poc:    false                   # iter8 1K POC: bitwise reproducible on legacy
  full:   true                    # 🎯 unlocks scale ladder
  num_workers:
    sanity: 0                     # in-process debug path, deterministic
    poc:    4
    full:   16                    # scipy gaussian σ=15 is CPU-bound; need processes
  prefetch_factor:     4          # 2 full batches lead → GPU never stalls
  persistent_workers:  true       # amortize worker-fork cost within a stage
  pin_memory:          true

# -- Optimization overrides --
optimization:
  lr: 1.0e-5                      # H1 #76 (2026-04-20). Linear-BS-scaled from Meta's V-JEPA 2.1 peak
                                  # 6e-4 at global BS=1536 (official vitG16 pretrain + cooldown start_lr,
                                  # facebookresearch/vjepa2/configs/train_2_1/vitG16/*.yaml). At our BS=32:
                                  # 6e-4 × (32/1536) = 1.25e-5 → rounded to 1e-5. Rule: Goyal et al 2017,
                                  # "Accurate Large Minibatch SGD" (arXiv:1706.02677).
                                  # NOT a "paper default" — 6e-4 is pretraining-from-scratch peak at
                                  # Meta's scale; applied to a PRETRAINED encoder at BS=32 it would
                                  # reproduce iter8's λ=0.001 catastrophic-forgetting regime (Prec@K
                                  # −21.8 pp, 2026-04-05 Run #2). 1e-5 = surgical regime where pretrained
                                  # features survive while still moving.
                                  # v10 evidence that 1e-6 was too low: grad_norm decayed 15× (2.28 →
                                  # 0.15) over 297 steps; effective update = lr × grad_norm × layer_decay
                                  # → late-stage updates ≈ 0 at 1e-6. 10× bump to 1e-5 tests the
                                  # under-training hypothesis directly.
                                  # warmup_pct=0.20 preserved; drift_control kept ON.
  # pred_lr_multiplier inherited from base_optimization.yaml (1.0, gold standard audit)
  layer_wise_lr_decay: true       # Smaller LR for earlier (already-frozen) layers
  layer_wise_lr_decay_factor: 0.75

  max_epochs:
    sanity: 1
    poc: 1                        # code-path validation only.
    full: 5                       # iter11 v2 (2026-04-24): 1 → 5. Unified budget across all variants; val-loss plateau gates stop. Matches SSL canon.

  batch_size: 32                  # Research-LOCKED effective (macro) BS — V-JEPA 2.1 published recipe (Adam β/LR/WD co-tuned at 32). AdaptiveBatchSizer picks MICRO sub-batch (start=4→max=32) for VRAM adaptation; 32 grads always accumulate before optimizer.step(). Changing BS forces LR re-tune (linear scaling) + invalidates "Surgery > Frozen" comparison to V-JEPA baseline.

  # Memory saver flags — MODE-GATED (#57).
  #
  # SANITY runs on 24GB RTX Pro 4000 (cheap, fast iteration) — needs both flags
  # ON: Stage 3 unfreezes 36/48 blocks → 1.38B trainable params → fp32 AdamW
  # state ~16.5 GB alone overflows 24 GB. Without savers, v5 OOMed at sub-batch=1
  # even after within-step retry (#55). 8-bit AdamW (bitsandbytes, Dettmers 2022
  # arXiv:2110.02861) reduces optimizer state 4×; gradient checkpointing
  # (torch.utils.checkpoint) cuts activation memory 2-4×. Combined fits all 3
  # stages with ~25% throughput hit. Acceptable — SANITY purpose per CLAUDE.md
  # is "code correctness, NOT model performance."
  #
  # POC/FULL runs on 96GB RTX Pro 6000 Blackwell — flags OFF. Research-quality
  # comparisons (Surgery > Frozen on Prec@K, non-overlapping 95% CIs) use the
  # published V-JEPA recipe (fp32 AdamW, no checkpointing) to eliminate 8-bit
  # as an accuracy confound. Dettmers' <1% accuracy claim was benchmarked ≤1.3B;
  # V-JEPA ViT-G is 2B (extrapolation). For a NeurIPS comparison where Surgery's
  # advantage might be ~1-5% Prec@K, the ~0.5% 8-bit noise would widen CIs and
  # threaten the win condition. 96 GB has headroom → no savers needed. ~33%
  # throughput gain vs 24GB path. Matches user priority: Accuracy > Throughput.
  use_8bit_optim:
    sanity: true      # 24GB SANITY: need memory saver (code correctness only)
    poc: false        # 96GB POC: clean fp32 for research-quality comparison
    full: false       # 96GB FULL: clean fp32 for paper-quality result
  gradient_checkpointing:
    sanity: true
    poc: false
    full: false
  # Paged optimizer (#58) — ONLY read when use_8bit_optim is true. SANITY Stage 3
  # (36 trainable blocks) needs CPU paging of optimizer state: fp32 master
  # weights (~5.5 GB) + 8-bit m1/m2 (~3 GB) + model + activations don't all fit
  # simultaneously in 24 GB even after inter-stage cleanup. `bnb.optim.PagedAdamW8bit`
  # uses unified memory — cold optimizer tensors page to CPU RAM on pressure,
  # warm ones stay on GPU. Same 8-bit quantization (no accuracy change), ~10-20%
  # throughput hit. HF QLoRA's default for fine-tuning 7-65B on consumer GPUs.
  paged_optim:
    sanity: true      # 24GB SANITY: page optimizer state on pressure
    poc: false        # 96GB POC: not needed (never used anyway since use_8bit_optim=false)
    full: false

# -- Factor datasets (m10/m11 prerequisite) --
factor_datasets:
  # Grounded-SAM pipeline: Grounding DINO (text → boxes) → SAM 3.1 (box → masks + propagation)
  # Replaces SAM 3.1 native text grounding (too weak on Indian objects: 10/15 clips had
  # n_agents=0 on SANITY). DINO trained on Objects365+GoldG (365 open-vocab categories).
  sam_model: facebook/sam3.1            # raw sam3 pkg (m10_sam_segment.py): SAM 3.1 weights
  sam_hf_model: facebook/sam3           # HF transformers wrapper (m10_sam_segment_v2_HF.py): Sam3TrackerVideoModel
  grounding_dino:
    model_id: "IDEA-Research/grounding-dino-base"   # Swin-B, 233M params, ~1.2 GB VRAM
    # H4 #76 (2026-04-20 post-v10): 0.15/0.12 → 0.20/0.18 — tighter DINO precision.
    # Evidence v10: m10 mean_concept_recall=0.655 (moderate); 12% clips had zero agents.
    # Hypothesis: noisy masks at 0.15 produce D_L leakage (agents not fully blurred) and
    # D_A contamination (background in agent-only). Tighter thresholds trade recall for
    # precision — acceptable because clips with no agents still contribute D_L (layout-only).
    # REQUIRES m10 cache invalidation (~9h re-run on 96GB, ~$7.40 GPU). User decides when
    # to `rm -rf outputs/full/m10_sam_segment/` to pick up new thresholds.
    # Baseline retained: 0.15/0.12 = was 0.25/0.20 aggressive-recall tune for SANITY dense100.
    box_threshold: 0.20                  # was 0.15 → 0.20 for v11+ (HF default 0.35)
    text_threshold: 0.18                 # was 0.12 → 0.18 for v11+ (HF default 0.25)
    # 17-category agent taxonomy (accuracy-first; goal = Surgery > ExPLoRA > Frozen on Prec@K).
    # Extended beyond tag_taxonomy.json's 11 agents with finer Objects365-aligned classes.
    agent_taxonomy:
      - pedestrian
      - person
      - vendor
      - policeman
      - bus
      - car
      - truck
      - motorcycle
      - bicycle
      - scooter
      - auto rickshaw
      - cycle rickshaw
      - cart
      - cow
      - dog
      - bull
      - buffalo

  iou_threshold: 0.3                  # Tracklet matching threshold
  motion_threshold: 0.05              # Frame width fraction (agent vs layout filter)
  motion_min_frames: 4                # Persistence required for "agent" classification
  agent_dilation_pixels: 4            # Mask dilation for thin structures (legs, bike spokes)
  min_confidence: 0.3                  # SAM 3.1 out_probs threshold (lowered from 0.5 to catch small/distant objects)
  min_mask_area_pct: 0.001             # Minimum mask area as fraction of frame (filters tree trunk false positives)

  # Patch operators (rendering)
  layout_patch_method: blur            # blur | inpaint
  agent_patch_method: soft_matte       # hard_zero | soft_matte
  soft_matte_factor: 0.1               # Background attenuation (1.0 = no change, 0 = hard zero)
  blur_sigma: 15.0                     # Gaussian blur sigma for D_L agent suppression
  feather_sigma: 3.0                   # Mask edge feathering sigma (prevents shortcut learning)
  min_agent_area_pct: 0.003            # Drop D_A if agent < 0.3% (calibrated to Grounded-SAM
                                       # output distribution: tight precise masks avg 0.5-1.0%).
                                       # Was 0.02 (calibrated for OLD noisy SAM3-text pipeline with
                                       # mean ~3-5% from false positives). At new distribution 0.02
                                       # would skip D_A on ~16/20 clips → starve Stage 2.
  max_agent_area_pct: 0.70             # Drop D_L if agent > 70% (layout invisible)

# -- Interaction mining (D_I) --
interaction_mining:
  enabled: true                       # iter10 v15c: re-enabled for safer-interactions Stage-3 ablation. m10 --interactions-only populates n_interactions in segments.json; m11 --regen-D_I builds tubes.
  min_overlap_frames: 4               # r in proposal Sec 11.2
  max_distance_frame_fraction: 0.20   # d_max
  cue_types: [approach, crossing, following]
  tube_margin_pct: 0.15               # Box expansion margin
  # #77 (2026-04-20): optional category-pair blacklist for typed D_I filtering.
  # m10 now annotates each interaction with cat_a + cat_b (canonical 17-cat taxonomy);
  # m11 drops interactions whose (cat_a, cat_b) or (cat_b, cat_a) matches any entry.
  # Default [] = accept all (no filter; back-compat). Example when re-enabling D_I
  # for Stage-3 ablation: [[cart, cart], [cow, cow]] drops "static × static" pairs
  # that don't produce meaningful interaction tubes.
  category_pair_blacklist: []

# -- Surgery: 3-stage progressive prefix unfreezing --
# Sec 11.5 of proposal — n1=0.25L, n2=0.50L, n3=0.75L
surgery:
  # Per-stage warmup as a fraction of stage_steps. Replaces the old fixed
  # warmup_steps=200 which broke POC (stage_steps≈99 < 200 → never reached full
  # LR). 0.20 = 20% of stage spent warming LR from 0→target, 80% at full LR.
  # Auto-scales: POC 100 clips → 19 warmup, POC 10K → 206, FULL 115K → 718.
  warmup_pct: 0.20
  # iter9 2-stage recipe (landed 2026-04-20 per plan_TODO.md:115 decision):
  # Stage 3 interaction retired after 1K POC evidence — BWT=-0.33, 0 best-ckpt
  # events in 27 Stage-3 probes, val_jepa 4× slower per step, Cycle@K drift
  # 63→62→61 never re-gains. Deep re-unfreezing (36/48 layers) was the forgetting
  # trigger (iter/utils/experiment_log.md 2026-04-19 diagnosis). D_I factor still
  # materialized by m11 for single ablation run (plan_TODO.md:152).
  # Stage 2 replay bumped 10 % → 30 % D_L (CLEAR 2018 NeurIPS: 50/50 novel-replay
  # optimal, [20-50 %] insensitive; 10 % sat below noise floor at Stage 1→2).
  # max_epochs_pct renormalized 0.33/0.33/0.34 → 0.50/0.50 (2 stages, sums to 1.0).
  stages:
    - name: stage1_layout
      unfreeze_below: 0.25          # Fraction of total depth (e.g., 12 of 48 layers)
      mode_mixture:
        L: 1.00                     # 100% layout-only
        A: 0.00
        I: 0.00
      max_epochs_pct: 0.40          # iter10 v15c: renormalized 0.50 → 0.40 for 3-stage split (sum 1.00)

    - name: stage2_agent
      unfreeze_below: 0.50          # 24 of 48 layers
      mode_mixture:
        L: 0.30                     # 30% replay (CLEAR 2018; was 10 % — too dilute)
        A: 0.70                     # 70% agent-only
        I: 0.00
      max_epochs_pct: 0.30          # iter10 v15c: renormalized 0.50 → 0.30

    - name: stage3_interaction
      # iter10 v15c: re-enabled for safer-interactions ablation.
      # unfreeze_below: 0.50 (NOT prior iter8's 0.75 which caused BWT=-0.33 over-destabilization).
      # Same depth as Stage 2 — doesn't unfreeze NEW layers, just changes the input distribution.
      # This is the critical "safer" knob: prior iter8 tried 0.75 (36/48 layers) → catastrophic.
      unfreeze_below: 0.50
      mode_mixture:
        L: 0.15                     # 15% layout replay (symmetric with Stage 2 replay ratio dropped)
        A: 0.15                     # 15% agent replay (anti-forgetting of Stage 2 gains)
        I: 0.70                     # 70% interaction tubes (was 0.85 in iter8 — tempered for safety)
      max_epochs_pct: 0.30

# -- Drift control: minimal --
# Surgery uses freezing as the primary anti-forgetting mechanism.
# Light drift control on unfrozen layers as belt-and-suspenders.
drift_control:
  enabled: true
  type: l2_uniform                  # Simple L2 (not EWC) for surgery
  lambda_reg: 1.0

# -- Mid-training probe eval (trajectory monitor + best-ckpt selection + kill-switch) --
# Probe runs on the held-out 10% split (see data.train_val_split). 100 clips on POC →
# Prec@K / mAP@K / Cycle@K with BCa 95% CI + JEPA val-loss. On `saves_per_epoch` cadence,
# probe fires every `steps_per_epoch // saves_per_epoch` steps → 10 probes/epoch.
# Best-ckpt: tracks running max Prec@K; exports student_best.pt on each new max; at
# end-of-training, student_best.pt is promoted to student_encoder.pt. Kill-switch:
# aborts training if Prec@K drops >forgetting_threshold_pct from running max for
# forgetting_patience consecutive probes (catastrophic-forgetting guard).
probe:
  enabled:
    sanity: false                 # N too small for stable BCa CI
    poc: true
    full: true
  subset: data/val_1k.json        # original subset (used only if split_ratio == 1.0; otherwise held-out val keys come from in-memory split)
  local_data: data/val_1k_local   # WebDataset TAR dir (1 shard for val_1k)
  tags_path: data/val_1k_local/tags.json
  k: 6                            # matches configs/pipeline.yaml eval.K
  bootstrap_iter: 10000           # matches utils/bootstrap.N_BOOTSTRAP
  cadence: saves_per_epoch        # stage_boundary | every_n_steps | saves_per_epoch — saves_per_epoch reuses `checkpoint.saves_per_epoch` (base_optimization.yaml:93) so probe cadence = ckpt-save cadence. No redundant knob.
  n_points: 30                    # kept for every_n_steps backward-compat (unused when cadence=saves_per_epoch).
  best_ckpt_enabled:              # export student_best.pt on each new max prec_at_k.mean; promote to student_encoder.pt post-training.
    sanity: false
    poc: true
    full: true
  kill_switch_enabled:            # abort if prec_at_k < running_max - forgetting_threshold_pct for forgetting_patience consecutive probes.
    sanity: false
    poc: true
    full: true
  forgetting_threshold_pct: 5.0   # absolute Prec@K points below running max that count as a forgetting strike.
  forgetting_patience: 3          # consecutive strikes → kill.
  # -- Early-stop #2: val-loss plateau detector --
  # Halts training when val_jepa_loss has not improved by more than plateau_min_delta
  # over the last plateau_patience consecutive probes. Catches "soft convergence" where
  # model keeps stepping but loss is flat — common at larger scales (10K/50K) where
  # 1-epoch budget may overshoot the useful training window.
  plateau_enabled:
    sanity: false
    poc: true
    full: true
  plateau_min_delta: 1.0e-3       # min val_jepa drop required to reset patience counter (range ~0.001 over ~0.48 loss = 0.2% relative).
  plateau_patience: 5             # consecutive probes with delta < min_delta → stop + export best-ckpt.
  # -- Early-stop #2b (H5 #76): Prec@K plateau detector --
  # val_jepa plateau catches soft convergence of the training objective, but v10
  # evidence showed val_jepa can KEEP dropping while Prec@K is flat or regressing
  # (representation decoupling: best Prec@K=30.33 @ step 58, then monotone ↓ while
  # val_jepa continued ↓ to step 297). This companion trigger fires when the direct
  # gate metric (Prec@K on val_500) is stagnant over the last prec_plateau_patience+1
  # probes (max - min < prec_plateau_min_delta). Prevents the "80 % of compute
  # produced 0 best-ckpt events" waste logged on v10.
  # min_delta sized against N=500 CI_half≈2.35 pp: 0.3 pp is well below noise,
  # so only true stagnation triggers (same spirit as the val_jepa 0.2 % threshold).
  prec_plateau_enabled:
    sanity: false
    poc: true
    full: true
  prec_plateau_min_delta: 0.3     # Prec@K percentage-points range required to reset patience (<< CI_half at N=500)
  prec_plateau_patience: 5        # consecutive probes with spread < min_delta → stop + export best-ckpt
  # -- Early-stop #3: negative-BWT cumulative trigger (Option C-adapted, #73) --
  # Noise-aware compound threshold: BWT = Prec@K[current] - Prec@K[first_probe].
  # Kill-switch fires when BOTH conditions hold for `bwt_patience` consecutive probes:
  #   (1) BWT < -bwt_ci_fraction × current_ci_half  (auto-scales to measurement noise:
  #       N=100 CI±4.5pp → -2.25pp; N=500 CI±2.4pp → -1.2pp; N=1000 CI±1.5pp → -0.75pp)
  #   (2) BWT < -bwt_absolute_floor  (absolute fail-safe: rules out "all within noise")
  # Retroactive validation: iter8 1K POC BWT=-0.33pp with CI±4.5pp → cond(1)=true
  # (-0.33 < -2.25? FALSE — actually still inside CI noise), cond(2)=true (-0.33 < -0.3).
  # The old flat -0.5pp threshold could NEVER fire at N=500+ (noise floor ≥ ±1.2pp × 0.5).
  # Literature ref: no published BWT kill threshold exists (GEM/EWC/iCaRL REPORT BWT only);
  # this noise-aware compound is novel — document in paper methods.
  bwt_trigger_enabled:
    sanity: false
    poc: true
    full: true
  bwt_ci_fraction: 0.5            # BWT must exceed 0.5× current CI_half to count as signal
  bwt_absolute_floor: 0.3         # PP — absolute fail-safe below CI-scaled threshold
  bwt_patience: 3                 # consecutive probes passing BOTH checks → stop (was 10, tightened per #73)
  # Legacy key retained for backward compat; m09c prefers bwt_ci_fraction + bwt_absolute_floor.
  bwt_tolerance_pct: 0.5          # DEPRECATED — kept to not break older configs; unused when new keys present.
  # -- Held-out val source: internal split vs permanent val_1k --
  # `use_permanent_val=true` → val_keys come from probe.subset (default val_1k.json);
  # factor_manifest must NOT contain any val_1k keys (verified fail-loud at runtime).
  # Set true only when training on a DIFFERENT set than val_1k (subset_10k, subset_50k,
  # FULL 115K) — then no internal split needed, all training clips used for training,
  # N=1000 held-out val for tighter CI (±1.5pp vs ±4.5pp at POC's N=100).
  # `use_permanent_val=false` → falls back to internal data.train_val_split logic
  # (needed for POC 1K code-test where training is val_1k itself).
  use_permanent_val:
    sanity: false
    poc: false                    # POC trains on val_1k itself → must split internally (no alternative set available).
    full: true                    # FULL trains on 115K (disjoint from val_1k by m00c construction) → use permanent val_1k for held-out eval.
  compute_val_loss: true          # also compute JEPA val-loss on probe clips at every probe point (m09c val-loss companion to probe Prec@K). Cheap (~6 s per call at N=1000).
  # NOTE: probe forward micro-batch is adaptive — AdaptiveBatchSizer reads
  # pipeline.yaml gpu.{inference_vjepa_initial_bs, inference_adapted_bs,
  # gpu_memory_target} at runtime. Do NOT hardcode a sub_batch here (violates
  # CLAUDE.md B35 "universal infra" rule, errors_N_fixes.md #47).
