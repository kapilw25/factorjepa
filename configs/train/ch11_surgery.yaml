# Ch11: Factor Surgery — Progressive Prefix Unfreezing with Factor Datasets
# (FactorJEPA proposal Sec 11)
#
# This is the PAPER NOVELTY. THE experiment that determines whether the approach works.
#
# Recipe:
#   1. SAM3 segments video clips into agent vs layout (motion filter)
#   2. Generate factor datasets:
#        D_L = layout-only (blur agents)
#        D_A = agent-only (suppress background)
#        D_I = interaction tubes (multi-agent events)
#   3. 3-stage progressive unfreezing on FROZEN V-JEPA 2.1 (no Ch10 prerequisite):
#        Stage 1: layers 0 → 25%L, 100% D_L
#        Stage 2: layers 0 → 50%L, 90% D_A + 10% D_L replay
#        Stage 3: layers 0 → 75%L, 85% D_I + 10% D_A + 5% D_L
#   4. Same JEPA loss — only input distribution and trainable depth change
#
# USAGE:
#   python -u src/m09c_surgery.py \
#       --model-config configs/model/vjepa2_1.yaml \
#       --train-config configs/train/ch11_surgery.yaml \
#       --FULL --subset data/subset_10k.json --local-data data/subset_10k_local
#
# POC Mode (Phase 2b, 2026-04-17 onward):
#   - 1000 clips from data/val_1k.json, all 3 factors (D_L + D_A + D_I), 3 stages
#   - Clip count derived from --subset + --local-data manifest (fail-loud, no yaml fallback)
#   - ~2.7 h GPU on RTX PRO 6000 96GB (100 epochs × 3 stages)

extends: base_optimization.yaml

# -- Data split overrides (m09c-specific train/val) --
# Deterministic 90/10 split via seeded shuffle (cfg.data.seed from base_optimization.yaml).
# Held-out val clip_keys are written to outputs/.../m09c_surgery/val_split.json for
# downstream Step D (Frozen m05), Step E (Surgical m05), Step F (m06 decision gate) —
# apples-to-apples on the same held-out 10%. SANITY uses 1.0 (no split) since N=20 is
# too small to split further. Removes the 2026-04-19 test-leakage flaw where training,
# probe, and decision gate all ran on identical val_1k clips.
data:
  train_val_split:
    sanity: 1.0                   # no split (N=20 too small)
    poc: 0.9                      # 900 train / 100 held-out val
    full: 0.9                     # 103K train / 12K held-out val

# -- Optimization overrides --
optimization:
  lr: 1.0e-6                      # Same as Ch10 (constant, post-audit)
  # pred_lr_multiplier inherited from base_optimization.yaml (1.0, gold standard audit)
  layer_wise_lr_decay: true       # Smaller LR for earlier (already-frozen) layers
  layer_wise_lr_decay_factor: 0.75

  max_epochs:
    sanity: 1
    poc: 5                        # 900 clips × 5 epochs / 32 BS ≈ 140 total steps / 3 stages ≈ 47 per stage (~25 min on 96GB)
    full: 1                       # 103K clips × 1 epoch / 32 BS ≈ 3220 total steps / 3 stages ≈ 1073 per stage (~5-6h on 96GB, single pass sufficient at 115K scale)

  batch_size: 32                  # Auto-overridden by profiler

  # Memory saver flags — MODE-GATED (#57).
  #
  # SANITY runs on 24GB RTX Pro 4000 (cheap, fast iteration) — needs both flags
  # ON: Stage 3 unfreezes 36/48 blocks → 1.38B trainable params → fp32 AdamW
  # state ~16.5 GB alone overflows 24 GB. Without savers, v5 OOMed at sub-batch=1
  # even after within-step retry (#55). 8-bit AdamW (bitsandbytes, Dettmers 2022
  # arXiv:2110.02861) reduces optimizer state 4×; gradient checkpointing
  # (torch.utils.checkpoint) cuts activation memory 2-4×. Combined fits all 3
  # stages with ~25% throughput hit. Acceptable — SANITY purpose per CLAUDE.md
  # is "code correctness, NOT model performance."
  #
  # POC/FULL runs on 96GB RTX Pro 6000 Blackwell — flags OFF. Research-quality
  # comparisons (Surgery > Frozen on Prec@K, non-overlapping 95% CIs) use the
  # published V-JEPA recipe (fp32 AdamW, no checkpointing) to eliminate 8-bit
  # as an accuracy confound. Dettmers' <1% accuracy claim was benchmarked ≤1.3B;
  # V-JEPA ViT-G is 2B (extrapolation). For a NeurIPS comparison where Surgery's
  # advantage might be ~1-5% Prec@K, the ~0.5% 8-bit noise would widen CIs and
  # threaten the win condition. 96 GB has headroom → no savers needed. ~33%
  # throughput gain vs 24GB path. Matches user priority: Accuracy > Throughput.
  use_8bit_optim:
    sanity: true      # 24GB SANITY: need memory saver (code correctness only)
    poc: false        # 96GB POC: clean fp32 for research-quality comparison
    full: false       # 96GB FULL: clean fp32 for paper-quality result
  gradient_checkpointing:
    sanity: true
    poc: false
    full: false
  # Paged optimizer (#58) — ONLY read when use_8bit_optim is true. SANITY Stage 3
  # (36 trainable blocks) needs CPU paging of optimizer state: fp32 master
  # weights (~5.5 GB) + 8-bit m1/m2 (~3 GB) + model + activations don't all fit
  # simultaneously in 24 GB even after inter-stage cleanup. `bnb.optim.PagedAdamW8bit`
  # uses unified memory — cold optimizer tensors page to CPU RAM on pressure,
  # warm ones stay on GPU. Same 8-bit quantization (no accuracy change), ~10-20%
  # throughput hit. HF QLoRA's default for fine-tuning 7-65B on consumer GPUs.
  paged_optim:
    sanity: true      # 24GB SANITY: page optimizer state on pressure
    poc: false        # 96GB POC: not needed (never used anyway since use_8bit_optim=false)
    full: false

# -- Factor datasets (m10/m11 prerequisite) --
factor_datasets:
  # Grounded-SAM pipeline: Grounding DINO (text → boxes) → SAM 3.1 (box → masks + propagation)
  # Replaces SAM 3.1 native text grounding (too weak on Indian objects: 10/15 clips had
  # n_agents=0 on SANITY). DINO trained on Objects365+GoldG (365 open-vocab categories).
  sam_model: facebook/sam3.1            # raw sam3 pkg (m10_sam_segment.py): SAM 3.1 weights
  sam_hf_model: facebook/sam3           # HF transformers wrapper (m10_sam_segment_v2_HF.py): Sam3TrackerVideoModel
  grounding_dino:
    model_id: "IDEA-Research/grounding-dino-base"   # Swin-B, 233M params, ~1.2 GB VRAM
    # Aggressive recall: SANITY v3 with 0.25/0.20 left 7/20 clips (35%) with zero
    # detections → at 115K scale = ~40K clips with no D_A/D_I training data → paper-killing.
    # FP risk mitigated downstream by SAM3 min_confidence=0.3 + min_mask_area_pct=0.001 +
    # fixed agent-only taxonomy (no layout category can be hallucinated).
    box_threshold: 0.15                  # was 0.25 (HF default 0.35)
    text_threshold: 0.12                 # was 0.20 (HF default 0.25)
    # 17-category agent taxonomy (accuracy-first; goal = Surgery > ExPLoRA > Frozen on Prec@K).
    # Extended beyond tag_taxonomy.json's 11 agents with finer Objects365-aligned classes.
    agent_taxonomy:
      - pedestrian
      - person
      - vendor
      - policeman
      - bus
      - car
      - truck
      - motorcycle
      - bicycle
      - scooter
      - auto rickshaw
      - cycle rickshaw
      - cart
      - cow
      - dog
      - bull
      - buffalo

  iou_threshold: 0.3                  # Tracklet matching threshold
  motion_threshold: 0.05              # Frame width fraction (agent vs layout filter)
  motion_min_frames: 4                # Persistence required for "agent" classification
  agent_dilation_pixels: 4            # Mask dilation for thin structures (legs, bike spokes)
  min_confidence: 0.3                  # SAM 3.1 out_probs threshold (lowered from 0.5 to catch small/distant objects)
  min_mask_area_pct: 0.001             # Minimum mask area as fraction of frame (filters tree trunk false positives)

  # Patch operators (rendering)
  layout_patch_method: blur            # blur | inpaint
  agent_patch_method: soft_matte       # hard_zero | soft_matte
  soft_matte_factor: 0.1               # Background attenuation (1.0 = no change, 0 = hard zero)
  blur_sigma: 15.0                     # Gaussian blur sigma for D_L agent suppression
  feather_sigma: 3.0                   # Mask edge feathering sigma (prevents shortcut learning)
  min_agent_area_pct: 0.003            # Drop D_A if agent < 0.3% (calibrated to Grounded-SAM
                                       # output distribution: tight precise masks avg 0.5-1.0%).
                                       # Was 0.02 (calibrated for OLD noisy SAM3-text pipeline with
                                       # mean ~3-5% from false positives). At new distribution 0.02
                                       # would skip D_A on ~16/20 clips → starve Stage 2.
  max_agent_area_pct: 0.70             # Drop D_L if agent > 70% (layout invisible)

# -- Interaction mining (D_I) --
interaction_mining:
  enabled: true                       # Set false for POC (skip D_I)
  min_overlap_frames: 4               # r in proposal Sec 11.2
  max_distance_frame_fraction: 0.20   # d_max
  cue_types: [approach, crossing, following]
  tube_margin_pct: 0.15               # Box expansion margin

# -- Surgery: 3-stage progressive prefix unfreezing --
# Sec 11.5 of proposal — n1=0.25L, n2=0.50L, n3=0.75L
surgery:
  # Per-stage warmup as a fraction of stage_steps. Replaces the old fixed
  # warmup_steps=200 which broke POC (stage_steps≈99 < 200 → never reached full
  # LR). 0.20 = 20% of stage spent warming LR from 0→target, 80% at full LR.
  # Auto-scales: POC 100 clips → 19 warmup, POC 10K → 206, FULL 115K → 718.
  warmup_pct: 0.20
  stages:
    - name: stage1_layout
      unfreeze_below: 0.25          # Fraction of total depth (e.g., 12 of 48 layers)
      mode_mixture:
        L: 1.00                     # 100% layout-only
        A: 0.00
        I: 0.00
      max_epochs_pct: 0.33          # 33% of total epoch budget

    - name: stage2_agent
      unfreeze_below: 0.50          # 24 of 48 layers
      mode_mixture:
        L: 0.10                     # 10% replay
        A: 0.90                     # 90% agent-only
        I: 0.00
      max_epochs_pct: 0.33

    - name: stage3_interaction
      unfreeze_below: 0.75          # 36 of 48 layers
      mode_mixture:
        L: 0.05                     # 5% replay
        A: 0.10                     # 10% replay
        I: 0.85                     # 85% interaction
      max_epochs_pct: 0.34

# -- Drift control: minimal --
# Surgery uses freezing as the primary anti-forgetting mechanism.
# Light drift control on unfrozen layers as belt-and-suspenders.
drift_control:
  enabled: true
  type: l2_uniform                  # Simple L2 (not EWC) for surgery
  lambda_reg: 1.0

# -- Mid-training probe eval (trajectory monitor + best-ckpt selection + kill-switch) --
# Probe runs on the held-out 10% split (see data.train_val_split). 100 clips on POC →
# Prec@K / mAP@K / Cycle@K with BCa 95% CI + JEPA val-loss. On `saves_per_epoch` cadence,
# probe fires every `steps_per_epoch // saves_per_epoch` steps → 10 probes/epoch.
# Best-ckpt: tracks running max Prec@K; exports student_best.pt on each new max; at
# end-of-training, student_best.pt is promoted to student_encoder.pt. Kill-switch:
# aborts training if Prec@K drops >forgetting_threshold_pct from running max for
# forgetting_patience consecutive probes (catastrophic-forgetting guard).
probe:
  enabled:
    sanity: false                 # N too small for stable BCa CI
    poc: true
    full: true
  subset: data/val_1k.json        # original subset (used only if split_ratio == 1.0; otherwise held-out val keys come from in-memory split)
  local_data: data/val_1k_local   # WebDataset TAR dir (1 shard for val_1k)
  tags_path: data/val_1k_local/tags.json
  k: 6                            # matches configs/pipeline.yaml eval.K
  bootstrap_iter: 10000           # matches utils/bootstrap.N_BOOTSTRAP
  cadence: saves_per_epoch        # stage_boundary | every_n_steps | saves_per_epoch — saves_per_epoch reuses `checkpoint.saves_per_epoch` (base_optimization.yaml:93) so probe cadence = ckpt-save cadence. No redundant knob.
  n_points: 30                    # kept for every_n_steps backward-compat (unused when cadence=saves_per_epoch).
  best_ckpt_enabled:              # export student_best.pt on each new max prec_at_k.mean; promote to student_encoder.pt post-training.
    sanity: false
    poc: true
    full: true
  kill_switch_enabled:            # abort if prec_at_k < running_max - forgetting_threshold_pct for forgetting_patience consecutive probes.
    sanity: false
    poc: true
    full: true
  forgetting_threshold_pct: 5.0   # absolute Prec@K points below running max that count as a forgetting strike.
  forgetting_patience: 3          # consecutive strikes → kill.
  compute_val_loss: true          # also compute JEPA val-loss on probe clips at every probe point (m09c val-loss companion to probe Prec@K). Cheap (~6 s per call at N=1000).
  # NOTE: probe forward micro-batch is adaptive — AdaptiveBatchSizer reads
  # pipeline.yaml gpu.{inference_vjepa_initial_bs, inference_adapted_bs,
  # gpu_memory_target} at runtime. Do NOT hardcode a sub_batch here (violates
  # CLAUDE.md B35 "universal infra" rule, errors_N_fixes.md #47).
