# ═══════════════════════════════════════════════════════════════════════
# Pipeline config — single source of truth for all src/m*.py scripts
# No hardcoded clip counts, dataset sizes, or magic numbers in Python.
# ═══════════════════════════════════════════════════════════════════════

# -- SANITY mode clip limits (per module) --
# Purpose: validate code runs end-to-end, not model quality
sanity:
  download: 3                 # m01: videos to download
  data_prep: 5                # m00b: durations to fetch
  download_subset: 20         # m00d: clips to download locally
  vlm_tag: 64                 # m04: clips to tag (= batch_size to avoid partial-batch overshoot)
  motion: 64                  # m04d: clips for motion features (match vlm_tag)
  embed: 64                   # m05/m05b/m05c: clips to embed (match vlm_tag)
  pretrain_train: 900         # m09: train clips (8 steps at BS=112)
  pretrain_val: 100           # m09: val clips
  default: 20                 # fallback for unlisted modules

# -- BAKEOFF mode --
bakeoff:
  clips: 2500                 # m04b: VLM comparison subset

# -- POC mode clip limits (per module) --
# Mirrors `sanity:` pattern. Purpose: bridge between SANITY (20 — code correctness)
# and FULL (10K+ — paper) for statistically meaningful per-clip quality distributions.
# Read via utils.config.get_poc_clip_limit("<module>") with `default` fallback.
poc:
  default_n: 10000            # m00c: default subset size for download (legacy alias)
  factor_prep: 100            # m10/m11 (run_factor_prep.sh --POC): 5× SANITY pool — gives
                               # meaningful percentiles in factor_manifest_quality.json
                               # without the ~10× FULL wall cost. iter13 v13 FIX-19.
  default: 100                # fallback for modules calling get_poc_clip_limit()

# -- Data processing --
data:
  clips_per_shard: 1000       # m03/m00d: WebDataset shard size (≈1 GB each at 480p MP4 × 1000 clips)
  data_prep_workers: 10       # m00b: concurrent duration fetchers
  clip_duration_sec: 10       # m06: default clip length for ±30s exclusion
  exclusion_window_sec: 30    # m06: hard mode temporal exclusion window
  download_resolution: 480    # m01: yt-dlp resolution
  # iter13 v13 FIX-23 (2026-05-07): soft-cap per TAR shard. utils.tar_shard.pack_dir_to_shards
  # WARNs (does NOT FATAL) if any shard exceeds this. Mirrors HF's recommended
  # per-file size for fast upload/download (HF's hard limit is much larger via LFS,
  # but >1 GB shards slow `hf download` significantly). m10 packs masks/ into N=10
  # shards; m11 packs D_L/D_A/D_I each into N shards. If WARN fires, bump
  # `--tar-shards` (m10) / `--tar-shards` (m11) on the next run.
  max_tar_shard_gb: 1.0

# -- Streaming & checkpointing --
streaming:
  max_retries: 5              # HF stream reconnect attempts
  checkpoint_every: 500       # clips between checkpoint saves (m04/m05)
  # iter13 (2026-05-05): probe extraction (utils/frozen_features.py) gets a
  # COARSER flush cadence. Probe Stage 2 train-split = ~6964 clips / ~30 min;
  # at the m04/m05 default of 500 that's 13 mid-flushes, each writing the
  # cumulative-so-far .npz (O(N²) total I/O). Bumping to 5000 reduces this
  # to 1 mid-flush + 1 final, ~10× less I/O without sacrificing crash safety
  # in any meaningful way (re-extract from clip 0 = 30 min, vs 13 partial
  # rewrites = 1+ hour at fp16 file sizes). m04/m05 keep their 500 cadence
  # because their extractions are hour-scale and finer resume granularity
  # IS load-bearing there.
  probe_features_checkpoint_every: 5000
  engine_restart_every: 10000 # m04/m05: worker subprocess restart interval
  prefetch_queue_vlm: 8       # m04: VLM producer queue depth (was 4, GPU starved)
  prefetch_queue_embed: 8     # m05/m05b/m05c: embedding producer queue depth (was 2, CRITICAL)
  prefetch_queue_train: 8     # m09: training producer queue depth (was 4, marginal)
  decode_workers_embed: 8     # m05/m05b/m05c: video decode threads (was 4, doubled for GPU feed)
  # m04d host-RAM scaling guide. CPU count is rarely the bottleneck (need ≥nproc/2);
  # the cgroup memory cap is. Anchor on cgroup memory.limit_in_bytes (NOT `free -h`
  # — cgroup cap can be far smaller than physical RAM in containers):
  #   ┌──────────────────┬──────────────────────┬──────────────────────┐
  #   │ cgroup memory    │ decode_workers_motion │ producer_queue_motion │
  #   ├──────────────────┼──────────────────────┼──────────────────────┤
  #   │ ≤36 GB           │ 4                    │ 8                    │
  #   │ ~64 GB           │ 8                    │ 16                   │  ← current
  #   │ ~96 GB           │ 12                   │ 32                   │
  #   │ ≥128 GB          │ 16                   │ 64                   │  ← old default
  #   └──────────────────┴──────────────────────┴──────────────────────┘
  # iter15 2026-05-14: OOMKilled at 16/64 on 36 GB cgroup (peak hit memory.max
  # exactly at clip 64). Pre-flight on every new instance:
  #   cat /sys/fs/cgroup/memory/memory.limit_in_bytes | \
  #     awk '{printf "%.1f GB cgroup cap\n", $1/1024/1024/1024}'
  decode_workers_motion: 8    # m04d: optical flow video decode threads (see scaling table above)
  decode_workers_train: 16    # m09: video decode threads (256 CPU cores)
  augment_workers: 8          # m05c: augmentation thread workers (was 4)
  producer_queue_motion: 16   # m04d: preprocessed clip batches buffered ahead (see scaling table above)

# -- GPU defaults (from VRAM profiling with real data on RTX PRO 6000 96GB) --
# Re-profile on different GPU: python -u src/utils/profile_vram.py --training/--inference/--dinov2
gpu:
  default_batch_size: 16      # fallback if profiler unavailable
  default_num_workers: 8      # dataloader workers
  vlm_batch_size: 4           # m04: transformers sequential inference
  motion_batch_size: 32       # m04d: optical flow batch
  # Profiled batch sizes (RTX PRO 6000, 96GB, real video data, median of 3 runs):
  training_batch_size: 112    # m09: 16 frames with grad ckpt (profiled)
  eval_frames_per_clip: 64   # m05/m05b: frames for embedding extraction (matches frozen V-JEPA HF model)
  inference_vjepa_bs: 176     # m05/m05b frozen: profiled at 64f with HF AutoModel (flash_attention_2)
  inference_adapted_bs: 44   # m05 adapted at 64f eval. BS=44: 32GB GPU, ~40GB CPU queue. BS=112 causes cgroup SIGKILL (101GB queue > 120GB limit).
  inference_dinov2_bs: 96     # m05b dinov2: 403 img/s, 3G VRAM (plateau, not noisy BS=16)
  # ═════════════════════════════════════════════════════════════════════════
  # AdaptiveBatchSizer — universal GPU infra (CLAUDE.md: "GPU util ≥85% TOP
  # PRIORITY"). Every GPU script with a batch loop wires this up (see #47).
  # Pattern: start at *_initial_bs, grow geometrically until gpu_memory_target ×
  # VRAM, halve + cooldown on OOM, bounded above by the module's *_bs max cap.
  # ═════════════════════════════════════════════════════════════════════════
  gpu_memory_target: 0.85              # UNIVERSAL VRAM ceiling for all sizers (m04/m05/m05b/m05c/m09/...)
  inference_vjepa_initial_bs: 8        # m05 V-JEPA native fwd (2B bf16 @ 64f) — safe start, max=inference_adapted_bs
  # iter13 (2026-05-05): probe extraction (utils/frozen_features.py) runs V-JEPA
  # at 16-FRAME (vs m05's 64-frame), so 4× fewer tokens per clip → 4× VRAM
  # headroom. Skip the slow 8 → 9 → ... → 24 cold ramp by starting at 20.
  # Observed VRAM at BS=8 was 8% of 96 GB ≈ 7.7 GB → linear extrapolation
  # → BS=20 ≈ 19% ≈ 18 GB, still well under the 85% cap (81 GB).
  # Saves ~30-60 sec ramp time per encoder × N_encoders.
  inference_vjepa_probe_initial_bs: 20
  inference_dinov2_initial_bs: 16      # m05b DINOv2-L (300M fp16) — safe start, max=inference_dinov2_bs
  inference_clip_initial_bs: 16        # m05b CLIP-L (400M fp16) — safe start, max=inference_dinov2_bs (same tier)
  training_initial_bs: 30              # iter13 (2026-05-05): 16 → 30. v9 measured AdaptiveBatch ramped 16→32 over 15 steps (~6.5 min cold ramp wasted). VRAM at BS=32 was ~50% (target 85%), so 30 is safely below the actual ceiling. Skips ~6 min of cold ramp per training run. Surprise OOM still recovered via AdaptiveBatchSizer.on_oom().
  # Probe BS — two contexts (probe = model.eval() forward to encode 1000 val_1k clips):
  # 1. inference_adapted_probe_bs: probe runs in pure-inference context (full 96 GB free).
  #    Same envelope as inference_adapted_bs → 44 is the established safe ceiling.
  # 2. training_adapted_probe_bs: probe runs DURING m09b/m09c training, where
  #    student+teacher+predictor+optimizer+grads ≈ 70 GB resident → only ~25 GB headroom.
  #    44 thrashes 44→22 (17 OOM retries × 2 calls × 54 probes ≈ 30 min wasted/run).
  #    24 fits without thrashing on RTX Pro 6000 / V-JEPA 2.1 ViT-G (1.85 B params, bf16).
  inference_adapted_probe_bs: 44
  training_adapted_probe_bs: 24

# -- Evaluation --
eval:
  faiss_k_neighbors: 6          # m06: kNN neighbors (includes self)
  temporal_sample_pairs: 100000  # m06b: pairs for temporal correlation
  temporal_motion_clusters: 4    # m06b: k-means clusters for motion
  motion_checkpoint_every: 200   # m04d: checkpoint interval
  llava_num_frames: 16           # m04: LLaVA-NeXT frame count (8-32 range)
  overlap_subsample: 30000       # m05c: random subsample for True Overlap@K (stat. sufficient for bootstrap CI)

# -- Probe-head training (Stage 3 of run_eval.sh, src/probe_action.py) --
# This is the ATTENTIVE PROBE CLASSIFIER — ~140K params trained on FROZEN
# encoder features (NOT the encoder pretrain in src/m09a1_pretrain_encoder.py, which
# has its own LR config in configs/train/pretrain_encoder.yaml at 1e-4).
# Stage 3 sweeps probe-head LRs to mimic Meta's multihead-best-LR convention
# (deps/vjepa2/configs/eval/vitg-384/ssv2.yaml has 5 LRs at fixed wd=0.8).
# Per-mode separation: SANITY uses 50 epochs to validate code paths quickly
# on small-N; FULL uses 20 epochs (Meta-faithful for ssv2/jester family).
# Single-LR fast-path: leave lr_sweep as a single-element list [5.0e-4] to
# skip the multi-LR sweep + run_select_best_lr_stage symlinking.
# Override at run-time: `LR_SWEEP="..." EPOCHS=N WARMUP_PCT=P ./run_eval.sh`.
probe_head_train:
  sanity:
    epochs: 50
    warmup_pct: 0.10
    lr_sweep: "5e-4"                  # single LR (validate code paths)
  poc:
    epochs: 20
    warmup_pct: 0.0
    lr_sweep: "5e-4"
  full:
    epochs: 20                        # Meta-faithful (vs SANITY's 50)
    warmup_pct: 0.0                   # Meta's published recipe (warmup=0 for the head)
    # Default single-LR string. For paper-faithful Meta-style multihead sweep,
    # set: lr_sweep: "1e-4 3e-4 1e-3 3e-3"
    # Multi-LR multiplies Stage 3 wall by N_lrs and invokes
    # run_select_best_lr_stage to symlink the winner to canonical paths so
    # Stage 4 paired_delta reads the best automatically.
    lr_sweep: "5e-4"

# -- Encoder registry (all model IDs + dims — no hardcoding in Python) --
encoders:
  vjepa:
    model_id: null
    dim: null
    type: video
    suffix: ""                       # Backward compat: existing 2.0 embeddings use no suffix
  vjepa_2_0_frozen:
    model_id: null
    dim: 1408
    type: video
    suffix: _vjepa_2_0_frozen        # Explicit name for V-JEPA 2.0 frozen
  random:
    model_id: null
    dim: null                        # Same as vjepa (synthetic baseline)
    type: synthetic
    suffix: _random
  oracle:
    model_id: null
    dim: null                        # Computed at runtime from tag-vocab sizes (m05b)
    type: synthetic                  # CPU-safe, deterministic — multi-hot tag vector
    suffix: _oracle                  # Upper-bound baseline: kNN ≈ 100% Prec@K by construction
  dinov2:
    model_id: facebook/dinov2-giant
    dim: 1536
    type: image
    suffix: _dinov2
  clip:
    model_id: openai/clip-vit-large-patch14
    dim: 768
    type: image
    suffix: _clip
  vjepa_shuffled:
    model_id: null                   # Same model as vjepa, frames shuffled
    dim: null
    type: video_shuffled
    suffix: _vjepa_shuffled
  vjepa_adapted:
    model_id: null
    dim: null
    type: video_adapted
    suffix: _vjepa_adapted
  vjepa_2_1_frozen:
    model_id: null
    dim: 1664
    type: video
    suffix: _vjepa_2_1_frozen
  vjepa_2_1_frozen_shuffled:
    model_id: null
    dim: 1664
    type: video_shuffled
    suffix: _vjepa_2_1_frozen_shuffled
  vjepa_2_1_explora:
    model_id: null
    dim: 1664
    type: video_adapted
    suffix: _vjepa_2_1_explora
  vjepa_2_1_surgical:
    model_id: null
    dim: 1664
    type: video_adapted
    suffix: _vjepa_2_1_surgical

# -- VLM models --
vlm:
  qwen: Qwen/Qwen3-VL-8B-Instruct
  videollama: DAMO-NLP-SG/VideoLLaMA3-7B
  llava: llava-hf/LLaVA-NeXT-Video-7B-hf

# -- Scene detection --
scene_detection:
  clip_min_duration: 4.0             # seconds
  clip_max_duration: 10.0            # seconds

# -- Verification thresholds (shell scripts) --
verify:
  sanity_min_clips: 5            # run_evaluate.sh / run_pretrain.sh: min clips for SANITY pass
  full_min_clips: 1000           # run_evaluate.sh / run_pretrain.sh: min clips for FULL pass
