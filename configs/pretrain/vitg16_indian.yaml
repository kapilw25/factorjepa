# V-JEPA 2 ViT-g Continual Pretraining on Indian Urban Clips
# Ref: proposal Sec 10.3-10.5, plan_code_dev.md, Q1_Q5_resolved.md
#
# USAGE:
#   python -u src/m09_pretrain.py --config configs/pretrain/vitg16_indian.yaml \
#       --SANITY 2>&1 | tee logs/m09_sanity.log
#   python -u src/m09_pretrain.py --config configs/pretrain/vitg16_indian.yaml \
#       --FULL --subset data/subset_10k.json --local-data data/subset_10k_local \
#       2>&1 | tee logs/m09_pretrain_poc.log

# -- Data --
data:
  hf_dataset: "anonymousML123/walkindia-200k"
  local_data: null                    # override with --local-data
  subset: null                        # override with --subset
  num_frames: 16                      # T frames per clip (16 for POC, 64 for full)
  crop_size: 384                      # spatial resolution (match pretrained)
  patch_size: 16
  tubelet_size: 2
  val_fraction: 0.1                   # 10% of videos held out
  val_seed: 42

# -- Model (Q1-Q5 corrected) --
model:
  arch: "vit_giant_xformers"          # 22 heads (NOT vit_giant which has 16)
  embed_dim: 1408
  depth: 40
  pred_depth: 12
  pred_embed_dim: 384
  pred_num_heads: 12
  num_mask_tokens: 2                  # one per mask generator (8-small + 2-large)
  use_rope: true                      # RoPE, not sincos pos_embed
  use_activation_checkpointing: true  # 78% VRAM savings (profiled)

# -- Masking (V-JEPA 2 config, verified from source) --
mask:
  - spatial_scale: [0.15, 0.15]
    temporal_scale: [1.0, 1.0]
    aspect_ratio: [0.75, 1.5]
    num_blocks: 8                     # 8 small blocks
  - spatial_scale: [0.7, 0.7]
    temporal_scale: [1.0, 1.0]
    aspect_ratio: [0.75, 1.5]
    num_blocks: 2                     # 2 large blocks

# -- Augmentation --
augmentation:
  random_resize_scale: [0.3, 1.0]
  random_resize_ratio: [0.75, 1.35]
  horizontal_flip: 0.5

# -- Optimization --
optimization:
  lr: 1.0e-5                         # adaptation-scale (100x smaller than from-scratch)
  pred_lr_multiplier: 10.0            # predictor LR = 1e-4
  warmup_steps: 500
  min_lr: 1.0e-7
  weight_decay: 0.04
  betas: [0.9, 0.999]
  eps: 1.0e-8
  grad_clip: 1.0
  ema_momentum: 0.99925              # fixed (V-JEPA 2 default)
  max_steps: 10000                   # POC: 2000, Full: 10000
  batch_size: 32                     # profiled: 27.8 GB at BS=32 with grad ckpt
  loss_exp: 1.0                      # L1 loss (V-JEPA 2 convention)

# -- Drift Control (Sec 10.4) --
drift_control:
  enabled: true
  lambda_reg: 0.01                   # ablate: [0, 0.001, 0.01, 0.1]

# -- Validation --
validation:
  interval_steps: 2000
  cycle_k: [1, 10]
  faiss_k: 6

# -- Checkpointing --
checkpoint:
  save_every_steps: 2000
  keep_last_n: 5
  output_dir: null                   # auto-set from --SANITY/--FULL/--subset

# -- Mixed Precision --
mixed_precision:
  enabled: true
  dtype: "bfloat16"
